name: negativo
description: Negativo — analog camera simulator, shoot film rolls and develop them later
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Database
  hive_ce: ^2.10.1
  hive_ce_flutter: ^2.2.0
  path_provider: ^2.1.1

  # Camera
  camera: ^0.11.0
  image_picker: ^1.0.5

  # Notifications
  flutter_local_notifications: ^19.5.0
  timezone: ^0.10.1

  # UI
  cupertino_icons: ^1.0.6
  intl: ^0.20.2

  # Image processing (film stock filters)
  image: ^4.2.0

  # Utilities
  uuid: ^4.2.1
  shared_preferences: ^2.2.2
  permission_handler: ^11.1.0
  path: ^1.8.3
  share_plus: ^7.2.1
  cross_file: ^0.3.3

  # Google Photos export
  google_sign_in: ^7.2.0
  google_sign_in_platform_interface: ^3.1.0
  googleapis: ^16.0.0
  googleapis_auth: ^2.0.0
  http: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  hive_ce_generator: ^1.8.0
  build_runner: ^2.4.7
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/icons/

module:
  androidX: true

flutter_launcher_icons:
  android: true
  ios: true
  # Rounded icon used everywhere (legacy Android, iOS — system clips further)
  image_path: "assets/icons/app_icon_rounded.png"
  remove_alpha_ios: true
  # Adaptive icon (Android 8+): launcher applies its own shape mask
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icons/app_icon.png"
  web:
    generate: false
  windows:
    generate: false
